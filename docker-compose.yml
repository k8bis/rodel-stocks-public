services:
  rodel-stocks:
    build: .
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${APP_PORT}:8020"

    networks:
      rodel_stocks_net:
        ipv4_address: ${APP_IP}
      rodelsoft_net: {}

    extra_hosts:
      - "${DOCKER_HOST_GATEWAY}"

networks:
  rodel_stocks_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}

  rodelsoft_net:
    external: true
    name: ${DOCKER_EXTERNAL_NETWORK}